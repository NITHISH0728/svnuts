<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | SV Dry Fruits & Nuts</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .checkout-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
    }
    .cart-summary, .customer-details {
      background: white;
      padding: 25px;
      border: 1px solid #eee;
    }
    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }
    .cart-item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border: 1px solid #eee;
    }
    .item-details {
      flex: 1;
      padding: 0 15px;
    }
    .item-details h4 { margin-bottom: 5px; font-weight: 500; }
    .item-remove {
      color: #000;
      cursor: pointer;
      background: none;
      border: none;
    }
    .cart-total {
      font-size: 1.5rem;
      font-weight: bold;
      text-align: right;
      margin-top: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      font-family: var(--font-main);
    }
    .whatsapp-btn {
      background: #000;
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      border: none;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s;
    }
    .whatsapp-btn:hover {
      background: #333;
    }
    @media (min-width: 768px) {
      .checkout-container {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="icon-btn" title="Back">
      <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <a href="index.html" class="logo-container">
      <img src="logo.png" alt="Logo">
      <h2 style="font-weight: 700; letter-spacing: 1px;">SV Dry Fruits & Nuts Checkout</h2>
    </a>
  </header>

  <main>
    <div class="checkout-container">
      <div class="cart-summary">
        <h2>Your Cart</h2>
        <div id="cart-items-container">
          <!-- Cart Items Injected Here -->
        </div>
        <div class="cart-total" id="cart-total">Total: Rs. 0</div>
      </div>

      <div class="customer-details">
        <h2>Delivery Details</h2>
        <form id="checkout-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="c-name" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" id="c-phone" required placeholder="9876543210">
          </div>
          <div class="form-group">
            <label>Address</label>
            <textarea id="c-address" rows="3" required placeholder="123 Main St, City"></textarea>
          </div>
          <div class="form-group">
            <label>Pincode</label>
            <input type="text" id="c-pincode" required placeholder="123456">
          </div>
          <button type="submit" class="whatsapp-btn">
            Checkout
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCart();

      document.getElementById('checkout-form').addEventListener('submit', function(e) {
        e.preventDefault();
        processCheckout();
      });
    });

    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cart-items-container');
      const totalEl = document.getElementById('cart-total');

      if (cart.length === 0) {
        container.innerHTML = '<p>Your cart is empty.</p>';
        totalEl.innerText = 'Total: Rs. 0';
        return;
      }

      let html = '';
      let total = 0;

      cart.forEach((item, index) => {
        const lineTotal = item.price * item.qty;
        total += lineTotal;
        html += `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}" class="no-download">
            <div class="item-details">
              <h4>${item.name}</h4>
              <p>${item.weight} (Qty: ${item.qty}) - Rs. ${lineTotal}</p>
            </div>
            <button class="item-remove" onclick="removeFromCart(${index})">
              <svg class="icon-svg" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
          </div>
        `;
      });

      container.innerHTML = html;
      totalEl.innerText = `Total: Rs. ${total}`;
    }

    function removeFromCart(index) {
      const cart = getCart();
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      renderCart();
    }

    function processCheckout() {
      const cart = getCart();
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }

      const name = document.getElementById('c-name').value;
      const phone = document.getElementById('c-phone').value;
      const address = document.getElementById('c-address').value;
      const pincode = document.getElementById('c-pincode').value;

      let total = 0;
      cart.forEach((item) => {
        total += item.price * item.qty;
      });

      const options = {
        "key": "rzp_test_Ru8lDcv8KvAiC0",
        "amount": total * 100,
        "currency": "INR",
        "name": "SV Dry Fruits & Nuts",
        "description": "Order Payment",
        "handler": function (response) {
          let orderText = `*New Order from SV Dry Fruits & Nuts* %0A%0A`;
          orderText += `*Order Status:* ✅ PAID%0A`;
          orderText += `*Payment ID:* ${response.razorpay_payment_id}%0A%0A`;
          orderText += `*Customer Details:*%0A`;
          orderText += `Name: ${name}%0A`;
          orderText += `Phone: ${phone}%0A`;
          orderText += `Address: ${address}%0A`;
          orderText += `Pincode: ${pincode}%0A%0A`;
          
          orderText += `*Order Items:*%0A`;
          cart.forEach((item, i) => {
            const lineTotal = item.price * item.qty;
            orderText += `${i+1}. ${item.name} (${item.weight}) x ${item.qty} - Rs. ${lineTotal}%0A`;
          });

          orderText += `%0A*Total Value: Rs. ${total}*`;

          const whatsappNumber = "918790328321";
          const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${orderText}`;

          // Clear cart
          localStorage.setItem('cart', JSON.stringify([]));
          
          // Redirect
          window.open(whatsappUrl);
        },
        "prefill": {
          "name": name,
          "contact": phone
        },
        "theme": {
          "color": "#000000"
        }
      };
      
      const rzp1 = new Razorpay(options);
      rzp1.open();
    }
  </script>
</body>
</html>

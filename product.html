<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .product-detail-container {
      max-width: 600px;
      margin: 20px auto;
      background: white;
      padding: 0;
    }
    .product-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      margin-bottom: 20px;
    }
    .product-info {
      padding: 0 20px 40px 20px;
    }
    .product-info h1 {
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .price-display {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .weight-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 25px;
    }
    .weight-btn {
      padding: 8px 15px;
      border: 1px solid #ddd;
      background: #f9f9f9;
      color: #333;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .weight-btn.active {
      border-color: #000;
      background: #000;
      color: #fff;
    }
    .qty-section {
      margin-bottom: 20px;
    }
    .qty-label {
      font-size: 0.9rem;
      margin-bottom: 8px;
      display: block;
    }
    .btn-block {
      display: block;
      width: 100%;
      padding: 15px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 10px;
    }
    .btn-add {
      background: #fff;
      color: #000;
      border: 1px solid #000;
    }
    .btn-buy {
      background: #000;
      color: #fff;
      border: 1px solid #000;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="icon-btn" title="Back">
      <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <a href="index.html" class="logo-container">
      <img src="logo.png" alt="Logo">
      <h2 style="font-weight: 700; letter-spacing: 1px;">NutriBite</h2>
    </a>
    <div class="header-icons">
      <a href="checkout.html" class="icon-btn" title="Cart">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        <span id="cart-count" class="cart-count">0</span>
      </a>
    </div>
  </header>

  <main>
    <div class="product-detail-container" id="product-container">
      <!-- Content injected via JS -->
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');
      const product = getProductById(productId);
      const allPrices = getPrices();
      
      if (!product || !allPrices[productId]) {
        document.getElementById('product-container').innerHTML = '<h2 style="padding:20px;">Product not found.</h2>';
        return;
      }

      const prices = allPrices[productId];
      const weights = ['50g', '100g', '250g', '500g', '1kg'];
      let selectedWeight = '250g'; // default
      let quantity = 1;

      const container = document.getElementById('product-container');
      
      function render() {
        let realPhotosHtml = '';
        if (product.realPhotos && product.realPhotos.length > 0) {
          realPhotosHtml = `
            <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
              <h2 style="font-size: 1.2rem; margin-bottom: 15px;">Real Product Photos</h2>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                ${product.realPhotos.map(url => `
                  <img src="${url}" alt="${product.name} Real Photo" class="no-download" style="width: 100%; aspect-ratio: 1; object-fit: cover; border: 1px solid #eee; border-radius: 4px;">
                `).join('')}
              </div>
            </div>
          `;
        }

        container.innerHTML = `
          <img src="${product.image}" alt="${product.name}" class="product-image no-download">
          <div class="product-info">
            <h1>${product.name} - ${selectedWeight}</h1>
            <div class="price-display">Rs. ${prices[selectedWeight]}.00</div>
            
            <p class="qty-label">Select Weight:</p>
            <div class="weight-options">
              ${weights.map(w => `
                <button class="weight-btn ${w === selectedWeight ? 'active' : ''}" onclick="selectWeight('${w}')">
                  ${w}
                </button>
              `).join('')}
            </div>

            <div class="qty-section">
              <span class="qty-label">Quantity</span>
              <div class="qty-selector">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <input type="text" class="qty-input" value="${quantity}" readonly>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>
            </div>

            <button class="btn-block btn-add" onclick="addCurrentToCart()">Add to cart</button>
            <button class="btn-block btn-buy" onclick="buyItNow()">Buy it now</button>
            ${realPhotosHtml}
          </div>
        `;
      }

      window.selectWeight = function(weight) {
        selectedWeight = weight;
        quantity = 1; // reset qty on variant change
        render();
      };

      window.changeQty = function(delta) {
        if (quantity + delta > 0) {
          quantity += delta;
          render();
        }
      };

      window.addCurrentToCart = function() {
        const item = {
          id: product.id,
          name: product.name,
          image: product.image,
          weight: selectedWeight,
          price: prices[selectedWeight]
        };
        addToCart(item, quantity);
      };

      window.buyItNow = function() {
        const item = {
          id: product.id,
          name: product.name,
          image: product.image,
          weight: selectedWeight,
          price: prices[selectedWeight]
        };
        // Add skip notification
        addToCart(item, quantity, true);
        window.location.href = "checkout.html";
      };

      render();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Nuts & Seeds</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top Navigation -->
  <header>
    <a href="admin.html" class="icon-btn" title="Admin Access">
      <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
    </a>
    <a href="index.html" class="logo-container">
      <img src="logo.png" alt="Logo">
      <h2 style="font-weight: 700; letter-spacing: 1px;">NutriBite</h2>
    </a>
    <div class="header-icons">
      <a href="checkout.html" class="icon-btn" title="Cart">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        <span id="cart-count" class="cart-count">0</span>
      </a>
    </div>
  </header>

  <main>
    <!-- Scrollable Hero Sections (Horizontal) -->
    <div class="hero-container">
      <section class="hero-section hero-nuts" style="background-image: url('c1.png');">
        <div class="hero-content">
          <h1>Premium Quality Nuts</h1>
          <a href="#nuts" class="shop-btn primary">Shop Nuts</a>
        </div>
      </section>

      <section class="hero-section hero-seeds" style="background-image: url('pum.png');">
        <div class="hero-content">
          <h1>Nutritious Seeds</h1>
          <a href="#seeds" class="shop-btn primary">Shop Seeds</a>
        </div>
      </section>

      <section class="hero-section hero-combos" style="background-image: url('nut.png');">
        <div class="hero-content">
          <h1>Signature Combos</h1>
          <a href="#combos" class="shop-btn primary">Shop Combos</a>
        </div>
      </section>
    </div>

    <!-- Sliding Circular Menu -->
    <section class="slider-container">
      <h2>Explore Our Range</h2>
      <div class="circular-slider">
        <a href="product.html?id=cashew" class="circle-item">
          <div class="circle-img-wrap"><img src="c1.png" alt="Cashew" class="no-download"></div>
          <span>Cashew</span>
        </a>
        <a href="product.html?id=almond" class="circle-item">
          <div class="circle-img-wrap"><img src="b1.png" alt="Almond" class="no-download"></div>
          <span>Almond</span>
        </a>
        <a href="product.html?id=pista" class="circle-item">
          <div class="circle-img-wrap"><img src="p1.png" alt="Pista" class="no-download"></div>
          <span>Pista</span>
        </a>
        <a href="product.html?id=walnut" class="circle-item">
          <div class="circle-img-wrap"><img src="w1.png" alt="Walnut" class="no-download"></div>
          <span>Walnut</span>
        </a>
        <a href="product.html?id=chia" class="circle-item">
          <div class="circle-img-wrap"><img src="chia.png" alt="Chia" class="no-download"></div>
          <span>Chia</span>
        </a>
        <a href="product.html?id=flax" class="circle-item">
          <div class="circle-img-wrap"><img src="flex.png" alt="Flax" class="no-download"></div>
          <span>Flax</span>
        </a>
        <a href="product.html?id=sunflower" class="circle-item">
          <div class="circle-img-wrap"><img src="sun.png" alt="Sunflower" class="no-download"></div>
          <span>Sunflower</span>
        </a>
        <a href="product.html?id=pumpkin" class="circle-item">
          <div class="circle-img-wrap"><img src="pum.png" alt="Pumpkin" class="no-download"></div>
          <span>Pumpkin</span>
        </a>
      </div>
    </section>

    <!-- Categories -->
    <section id="nuts" class="category-section">
      <h2>Nuts Collection</h2>
      <div class="product-grid" id="nuts-grid"></div>
    </section>

    <section id="seeds" class="category-section">
      <h2>Seeds Collection</h2>
      <div class="product-grid" id="seeds-grid"></div>
    </section>

    <section id="combos" class="category-section">
      <h2>Combos Selection</h2>
      <div class="product-grid" id="combos-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    // Render Products Grid
    function renderProducts() {
      const allPrices = getPrices();
      
      const generateHTML = (items) => {
        return items.map(item => {
          // Display the 250g price on the main grid as default
          const defaultPrice = allPrices[item.id] ? allPrices[item.id]['250g'] : 0;
          return `
            <a href="product.html?id=${item.id}" class="product-card">
              <img src="${item.image}" alt="${item.name}" class="no-download">
              <div class="product-card-body">
                <h3>${item.name}</h3>
                <div class="price">Rs. ${defaultPrice}.00</div>
                <div class="shop-btn" style="display:block; padding: 10px; font-size: 0.9rem;">Add to cart</div>
              </div>
            </a>
          `;
        }).join('');
      };

      document.getElementById('nuts-grid').innerHTML = generateHTML(products.nuts);
      document.getElementById('seeds-grid').innerHTML = generateHTML(products.seeds);
      document.getElementById('combos-grid').innerHTML = generateHTML(products.combos);
    }
    
    document.addEventListener('DOMContentLoaded', renderProducts);
  </script>
</body>
</html>

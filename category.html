<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category | SV Dry Fruits & Nuts</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .category-page-header {
      padding: 40px 20px 20px;
      text-align: center;
    }
    .category-page-header h1 {
      font-size: 2.5rem;
      text-transform: capitalize;
    }
    .category-page-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <header>
    <a href="admin.html" class="icon-btn" title="Admin Access">
      <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
    </a>
    <a href="index.html" class="logo-container">
      <img src="logo.png" alt="Logo">
      <h2 style="font-weight: 700; letter-spacing: 1px;">SV Dry Fruits & Nuts</h2>
    </a>
    <div class="header-icons">
      <a href="checkout.html" class="icon-btn" title="Cart">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        <span id="cart-count" class="cart-count">0</span>
      </a>
    </div>
  </header>

  <main>
    <div class="category-page-header">
      <h1 id="category-title">Collection</h1>
    </div>
    
    <div class="category-page-container">
      <div class="product-grid" id="category-grid">
        <!-- Products injected here -->
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const categoryType = urlParams.get('type');
      
      const titleEl = document.getElementById('category-title');
      const gridEl = document.getElementById('category-grid');

      const allPrices = getPrices();
      
      const generateHTML = (items) => {
        return items.map(item => {
          const defaultPrice = allPrices[item.id] ? allPrices[item.id]['250g'] : 0;
          return `
            <a href="product.html?id=${item.id}" class="product-card">
              <img src="${item.image}" alt="${item.name}" class="no-download">
              <div class="product-card-body">
                <h3>${item.name}</h3>
                <div class="price">Rs. ${defaultPrice}.00</div>
                <div class="shop-btn" style="display:block; padding: 10px; font-size: 0.9rem;">Add to cart</div>
              </div>
            </a>
          `;
        }).join('');
      };

      if (categoryType && products[categoryType]) {
        titleEl.textContent = categoryType + " Collection";
        gridEl.innerHTML = generateHTML(products[categoryType]);
      } else {
        titleEl.textContent = "Category Not Found";
        gridEl.innerHTML = "<p>No products available in this category.</p>";
      }
    });
  </script>
</body>
</html>
